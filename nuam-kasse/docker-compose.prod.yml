name: nuam-kasse

services:
  db:
    image: postgres:16-alpine
    container_name: nuam-kasse-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - nuam_kasse_postgres_data:/var/lib/postgresql/data
      - nuam_kasse_backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - nuam_kasse_internal

  migrate:
    image: nuam-kasse-backend:${APP_VERSION:-0.6.0}
    build:
      context: ./backend
    container_name: nuam-kasse-migrate
    restart: "no"
    environment:
      APP_NAME: ${APP_NAME:-Nuam Kasse}
      APP_VERSION: ${APP_VERSION:-0.6.0}
      APP_ENV: production
      DEBUG: "false"
      ENABLE_API_DOCS: "false"
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/${POSTGRES_DB:?POSTGRES_DB is required}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-nuam_kasse_session}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-168}
      SESSION_COOKIE_SECURE: "true"
      SESSION_COOKIE_SAMESITE: ${SESSION_COOKIE_SAMESITE:-lax}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-}
    command: ["alembic", "upgrade", "head"]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - nuam_kasse_internal

  backend:
    image: nuam-kasse-backend:${APP_VERSION:-0.6.0}
    build:
      context: ./backend
    container_name: nuam-kasse-backend
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-Nuam Kasse}
      APP_VERSION: ${APP_VERSION:-0.6.0}
      APP_ENV: production
      DEBUG: "false"
      ENABLE_API_DOCS: "false"
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/${POSTGRES_DB:?POSTGRES_DB is required}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-nuam_kasse_session}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-168}
      SESSION_COOKIE_SECURE: "true"
      SESSION_COOKIE_SAMESITE: ${SESSION_COOKIE_SAMESITE:-lax}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import json, urllib.request; data=json.load(urllib.request.urlopen('http://localhost:8000/api/v1/health', timeout=3)); raise SystemExit(0 if data.get('database') == 'connected' else 1)",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - nuam_kasse_internal

  frontend:
    image: nuam-kasse-frontend:${APP_VERSION:-0.6.0}
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
        VITE_APP_VERSION: ${VITE_APP_VERSION:-0.6.0}
    container_name: nuam-kasse-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - nuam_kasse_internal
      - nuam_kasse_proxy

volumes:
  nuam_kasse_postgres_data:
    name: nuam_kasse_postgres_data
  nuam_kasse_backups:
    name: nuam_kasse_backups

networks:
  nuam_kasse_internal:
    name: nuam_kasse_internal
    driver: bridge
  nuam_kasse_proxy:
    name: ${NUAM_KASSE_PROXY_NETWORK:-nuam_kasse_proxy}
    external: true
